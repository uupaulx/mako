<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ลงทะเบียน มาโกะ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 32px 24px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    }
    .profile {
      text-align: center;
      margin-bottom: 24px;
    }
    .profile img {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 3px solid #667eea;
      margin-bottom: 8px;
    }
    .profile h2 {
      font-size: 18px;
      color: #333;
    }
    .profile p {
      font-size: 13px;
      color: #999;
    }
    h1 {
      text-align: center;
      font-size: 22px;
      color: #333;
      margin-bottom: 8px;
    }
    .subtitle {
      text-align: center;
      font-size: 14px;
      color: #888;
      margin-bottom: 24px;
    }
    .form-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #555;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      font-size: 16px;
      transition: border-color 0.2s;
      outline: none;
    }
    input:focus {
      border-color: #667eea;
    }
    input::placeholder {
      color: #bbb;
    }
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s;
    }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
    }
    .status {
      text-align: center;
      margin-top: 16px;
      font-size: 14px;
      min-height: 20px;
    }
    .status.error { color: #e74c3c; }
    .status.success { color: #27ae60; }
    .status.loading { color: #888; }
    .hidden { display: none; }

    .success-screen {
      text-align: center;
      padding: 40px 20px;
    }
    .success-screen .checkmark {
      font-size: 64px;
      margin-bottom: 16px;
    }
    .success-screen h2 {
      color: #27ae60;
      margin-bottom: 8px;
    }
    .success-screen p {
      color: #666;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <!-- Registration Form -->
  <div class="card" id="formCard">
    <h1>ลงทะเบียน มาโกะ</h1>
    <p class="subtitle">กรอกข้อมูลเพื่อเริ่มใช้งาน</p>

    <div class="profile hidden" id="profileSection">
      <img id="profilePic" src="" alt="profile">
      <h2 id="displayName"></h2>
      <p>LINE Account</p>
    </div>

    <form id="registerForm">
      <div class="form-group">
        <label for="fullName">ชื่อ-นามสกุล</label>
        <input type="text" id="fullName" placeholder="เช่น สมชาย ใจดี" required>
      </div>
      <div class="form-group">
        <label for="phone">เบอร์โทรศัพท์</label>
        <input type="tel" id="phone" placeholder="เช่น 0891234567" pattern="[0-9]{9,10}" required>
      </div>
      <button type="submit" class="btn btn-primary" id="submitBtn">ลงทะเบียน</button>
    </form>
    <div class="status" id="statusMsg"></div>
  </div>

  <!-- Success Screen -->
  <div class="card hidden" id="successCard">
    <div class="success-screen">
      <div class="checkmark">&#10003;</div>
      <h2>ลงทะเบียนสำเร็จ!</h2>
      <p>คุณสามารถคุยกับมาโกะได้แล้ว<br>กลับไปที่แชทเลยนะ</p>
    </div>
  </div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js?v=2"
          onerror="document.getElementById('statusMsg').textContent='SDK โหลดไม่ได้ กรุณาปิดแล้วเปิดใหม่';document.getElementById('statusMsg').className='status error'"></script>
  <script>
    // === CONFIG ===
    const LIFF_ID = '2009540787-qDZLFlcY';  // TODO: ใส่ LIFF ID จาก LINE Developers Console
    const WEBHOOK_URL = 'https://n8nv2.icpladda.com/webhook/mako-register';  // n8n webhook

    let lineProfile = null;

    async function initLiff() {
      const status = document.getElementById('statusMsg');
      try {
        status.textContent = 'กำลังเชื่อมต่อ LINE...';
        status.className = 'status loading';

        await liff.init({ liffId: LIFF_ID });

        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        lineProfile = await liff.getProfile();

        // Show profile
        const profileSection = document.getElementById('profileSection');
        document.getElementById('profilePic').src = lineProfile.pictureUrl || '';
        document.getElementById('displayName').textContent = lineProfile.displayName;
        profileSection.classList.remove('hidden');

        status.textContent = '';
      } catch (err) {
        status.textContent = 'ไม่สามารถเชื่อมต่อ LINE ได้: ' + err.message;
        status.className = 'status error';
      }
    }

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const submitBtn = document.getElementById('submitBtn');
      const status = document.getElementById('statusMsg');
      const fullName = document.getElementById('fullName').value.trim();
      const phone = document.getElementById('phone').value.trim();

      if (!fullName || !phone) {
        status.textContent = 'กรุณากรอกข้อมูลให้ครบ';
        status.className = 'status error';
        return;
      }

      if (!lineProfile) {
        status.textContent = 'ไม่พบข้อมูล LINE กรุณารีเฟรช';
        status.className = 'status error';
        return;
      }

      submitBtn.disabled = true;
      status.textContent = 'กำลังลงทะเบียน...';
      status.className = 'status loading';

      try {
        const res = await fetch(WEBHOOK_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            userId: lineProfile.userId,
            displayName: lineProfile.displayName,
            pictureUrl: lineProfile.pictureUrl || '',
            fullName,
            phone
          })
        });

        const data = await res.json();

        if (data.success) {
          document.getElementById('formCard').classList.add('hidden');
          document.getElementById('successCard').classList.remove('hidden');
          setTimeout(() => {
            if (liff.isInClient()) {
              liff.closeWindow();
            }
          }, 2000);
        } else {
          status.textContent = data.message || 'เกิดข้อผิดพลาด กรุณาลองใหม่';
          status.className = 'status error';
          submitBtn.disabled = false;
        }
      } catch (err) {
        status.textContent = 'เกิดข้อผิดพลาด: ' + err.message;
        status.className = 'status error';
        submitBtn.disabled = false;
      }
    });

    if (typeof liff !== 'undefined') {
      initLiff();
    } else {
      document.getElementById('statusMsg').textContent = 'กำลังโหลด กรุณารอสักครู่...';
      document.getElementById('statusMsg').className = 'status loading';
      window.addEventListener('load', function() {
        if (typeof liff !== 'undefined') {
          initLiff();
        } else {
          document.getElementById('statusMsg').textContent = 'ไม่สามารถโหลด LINE SDK ได้ กรุณาปิดแล้วเปิดใหม่';
          document.getElementById('statusMsg').className = 'status error';
        }
      });
    }
  </script>
</body>
</html>
