<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ลงทะเบียน มาโกะ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 32px 24px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    }
    .profile {
      text-align: center;
      margin-bottom: 24px;
    }
    .profile img {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 3px solid #667eea;
      margin-bottom: 8px;
    }
    .profile h2 { font-size: 18px; color: #333; }
    .profile p { font-size: 13px; color: #999; }
    h1 {
      text-align: center;
      font-size: 22px;
      color: #333;
      margin-bottom: 8px;
    }
    .subtitle {
      text-align: center;
      font-size: 14px;
      color: #888;
      margin-bottom: 24px;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #333;
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      font-size: 16px;
      transition: border-color 0.2s;
    }
    .form-group input:focus {
      outline: none;
      border-color: #667eea;
    }
    .form-group .hint {
      font-size: 12px;
      color: #999;
      margin-top: 4px;
    }
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
    }
    .btn-primary:hover { opacity: 0.9; }
    .status {
      text-align: center;
      margin-top: 16px;
      font-size: 14px;
      min-height: 20px;
    }
    .status.error { color: #e74c3c; }
    .status.success { color: #27ae60; }
    .status.loading { color: #888; }
    .hidden { display: none; }
    .success-screen {
      text-align: center;
      padding: 40px 20px;
    }
    .success-screen .checkmark { font-size: 64px; margin-bottom: 16px; }
    .success-screen h2 { color: #27ae60; margin-bottom: 8px; }
    .success-screen p { color: #666; font-size: 14px; }
    .success-screen .emp-info {
      margin-top: 16px;
      padding: 12px;
      background: #f0f4ff;
      border-radius: 12px;
      text-align: left;
      font-size: 14px;
      color: #555;
    }
    .success-screen .emp-info strong { color: #333; }
  </style>
</head>
<body>
  <!-- Registration Form -->
  <div class="card" id="formCard">
    <h1>ลงทะเบียน มาโกะ</h1>
    <p class="subtitle">กรอก email บริษัทเพื่อเริ่มใช้งาน</p>

    <div class="profile hidden" id="profileSection">
      <img id="profilePic" src="" alt="profile">
      <h2 id="displayName"></h2>
      <p>LINE Account</p>
    </div>

    <div class="form-group">
      <label for="emailInput">Email บริษัท</label>
      <input type="email" id="emailInput" placeholder="name@icpladda.com" autocomplete="email">
      <div class="hint">ใช้ email ที่ลงทะเบียนในระบบบริษัท</div>
    </div>

    <button class="btn btn-primary" id="submitBtn" disabled>ลงทะเบียน</button>

    <div class="status" id="statusMsg"></div>
  </div>

  <!-- Success Screen -->
  <div class="card hidden" id="successCard">
    <div class="success-screen">
      <div class="checkmark">&#10003;</div>
      <h2>ลงทะเบียนสำเร็จ!</h2>
      <p>คุณสามารถคุยกับมาโกะได้แล้ว<br>กลับไปที่แชทเลยนะ</p>
      <div class="emp-info" id="empInfo"></div>
    </div>
  </div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js?v=4"></script>
  <script>
    // === CONFIG ===
    const LIFF_ID = '2009540787-qDZLFlcY';
    const WEBHOOK_URL = 'https://n8nv2.icpladda.com/webhook/mako-register';

    let lineProfile = null;

    // === Init LIFF ===
    async function initLiff() {
      const status = document.getElementById('statusMsg');
      try {
        status.textContent = 'กำลังเชื่อมต่อ LINE...';
        status.className = 'status loading';

        await liff.init({ liffId: LIFF_ID });

        if (!liff.isLoggedIn()) {
          if (liff.isInClient()) {
            liff.login();
            return;
          } else {
            if (!window.location.href.includes('liff.state')) {
              liff.login();
              return;
            }
            status.textContent = 'กรุณาเปิดลิงก์นี้จากแชทมาโกะใน LINE';
            status.className = 'status error';
            return;
          }
        }

        lineProfile = await liff.getProfile();

        // Show LINE profile
        document.getElementById('profilePic').src = lineProfile.pictureUrl || '';
        document.getElementById('displayName').textContent = lineProfile.displayName;
        document.getElementById('profileSection').classList.remove('hidden');

        // Enable form
        document.getElementById('submitBtn').disabled = false;
        status.textContent = '';

      } catch (err) {
        status.textContent = 'ไม่สามารถเชื่อมต่อ LINE ได้: ' + err.message;
        status.className = 'status error';
      }
    }

    // === Submit Registration ===
    document.getElementById('submitBtn').addEventListener('click', async () => {
      const email = document.getElementById('emailInput').value.trim().toLowerCase();
      const status = document.getElementById('statusMsg');

      if (!email) {
        status.textContent = 'กรุณากรอก email';
        status.className = 'status error';
        return;
      }

      if (!email.includes('@')) {
        status.textContent = 'รูปแบบ email ไม่ถูกต้อง';
        status.className = 'status error';
        return;
      }

      status.textContent = 'กำลังตรวจสอบ...';
      status.className = 'status loading';
      document.getElementById('submitBtn').disabled = true;

      try {
        const res = await fetch(WEBHOOK_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            userId: lineProfile.userId,
            displayName: lineProfile.displayName,
            pictureUrl: lineProfile.pictureUrl || '',
            msEmail: email,
            msName: lineProfile.displayName
          })
        });

        const data = await res.json();

        if (data.success) {
          document.getElementById('formCard').classList.add('hidden');
          document.getElementById('successCard').classList.remove('hidden');

          // Show employee info if available
          if (data.employee) {
            const info = document.getElementById('empInfo');
            info.innerHTML = '<strong>' + (data.employee.name || '') + '</strong><br>' +
              (data.employee.department || '') + ' - ' + (data.employee.position || '');
          }

          setTimeout(() => {
            if (liff.isInClient()) {
              liff.closeWindow();
            }
          }, 3000);
        } else {
          status.textContent = data.message || 'เกิดข้อผิดพลาด กรุณาลองใหม่';
          status.className = 'status error';
          document.getElementById('submitBtn').disabled = false;
        }
      } catch (err) {
        status.textContent = 'เกิดข้อผิดพลาด: ' + err.message;
        status.className = 'status error';
        document.getElementById('submitBtn').disabled = false;
      }
    });

    // Allow Enter key to submit
    document.getElementById('emailInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') document.getElementById('submitBtn').click();
    });

    // === Start ===
    if (typeof liff !== 'undefined') {
      initLiff();
    } else {
      document.getElementById('statusMsg').textContent = 'กำลังโหลด...';
      document.getElementById('statusMsg').className = 'status loading';
      window.addEventListener('load', () => {
        if (typeof liff !== 'undefined') initLiff();
        else {
          document.getElementById('statusMsg').textContent = 'ไม่สามารถโหลด LINE SDK ได้';
          document.getElementById('statusMsg').className = 'status error';
        }
      });
    }
  </script>
</body>
</html>
