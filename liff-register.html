<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ลงทะเบียน มาโกะ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 32px 24px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    }
    .profile {
      text-align: center;
      margin-bottom: 24px;
    }
    .profile img {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 3px solid #667eea;
      margin-bottom: 8px;
    }
    .profile h2 {
      font-size: 18px;
      color: #333;
    }
    .profile p {
      font-size: 13px;
      color: #999;
    }
    h1 {
      text-align: center;
      font-size: 22px;
      color: #333;
      margin-bottom: 8px;
    }
    .subtitle {
      text-align: center;
      font-size: 14px;
      color: #888;
      margin-bottom: 24px;
    }
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .btn-ms {
      background: #2f2f2f;
      color: #fff;
    }
    .btn-ms:hover { background: #1a1a1a; }
    .btn-ms svg { width: 20px; height: 20px; }
    .status {
      text-align: center;
      margin-top: 16px;
      font-size: 14px;
      min-height: 20px;
    }
    .status.error { color: #e74c3c; }
    .status.success { color: #27ae60; }
    .status.loading { color: #888; }
    .hidden { display: none; }
    .success-screen {
      text-align: center;
      padding: 40px 20px;
    }
    .success-screen .checkmark {
      font-size: 64px;
      margin-bottom: 16px;
    }
    .success-screen h2 {
      color: #27ae60;
      margin-bottom: 8px;
    }
    .success-screen p {
      color: #666;
      font-size: 14px;
    }
    .ms-account {
      text-align: center;
      margin: 16px 0;
      padding: 12px;
      background: #f0f4ff;
      border-radius: 12px;
    }
    .ms-account .email {
      font-size: 14px;
      color: #667eea;
      font-weight: 600;
    }
    .ms-account .name {
      font-size: 13px;
      color: #888;
    }
  </style>
</head>
<body>
  <!-- Registration Form -->
  <div class="card" id="formCard">
    <h1>ลงทะเบียน มาโกะ</h1>
    <p class="subtitle">เข้าสู่ระบบด้วยบัญชี Microsoft ของบริษัท</p>

    <div class="profile hidden" id="profileSection">
      <img id="profilePic" src="" alt="profile">
      <h2 id="displayName"></h2>
      <p>LINE Account</p>
    </div>

    <div class="hidden" id="msAccountSection">
      <div class="ms-account">
        <div class="name" id="msName"></div>
        <div class="email" id="msEmail"></div>
      </div>
    </div>

    <button class="btn btn-ms" id="msLoginBtn" disabled>
      <svg viewBox="0 0 21 21" fill="none"><rect x="1" y="1" width="9" height="9" fill="#F25022"/><rect x="11" y="1" width="9" height="9" fill="#7FBA00"/><rect x="1" y="11" width="9" height="9" fill="#00A4EF"/><rect x="11" y="11" width="9" height="9" fill="#FFB900"/></svg>
      เข้าสู่ระบบด้วย Microsoft
    </button>

    <div class="status" id="statusMsg"></div>
  </div>

  <!-- Success Screen -->
  <div class="card hidden" id="successCard">
    <div class="success-screen">
      <div class="checkmark">&#10003;</div>
      <h2>ลงทะเบียนสำเร็จ!</h2>
      <p>คุณสามารถคุยกับมาโกะได้แล้ว<br>กลับไปที่แชทเลยนะ</p>
    </div>
  </div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js?v=4"></script>
  <script src="https://alcdn.msauth.net/browser/2.32.2/js/msal-browser.min.js"
          onerror="document.getElementById('statusMsg').textContent='Microsoft SDK โหลดไม่ได้ กรุณาปิดแล้วเปิดใหม่';document.getElementById('statusMsg').className='status error'"></script>
  <script>
    // === CONFIG ===
    const LIFF_ID = '2009540787-qDZLFlcY';
    const MS_CLIENT_ID = '7e3f0ef4-f227-4ede-9e18-5e29b3c06d34';
    const WEBHOOK_URL = 'https://n8nv2.icpladda.com/webhook/mako-register';

    let lineProfile = null;
    let msalInstance = null;

    // === MSAL Config ===
    const msalConfig = {
      auth: {
        clientId: MS_CLIENT_ID,
        authority: 'https://login.microsoftonline.com/common',
        redirectUri: window.location.origin + window.location.pathname
      },
      cache: {
        cacheLocation: 'sessionStorage',
        storeAuthStateInCookie: true
      }
    };

    // === Init LIFF ===
    async function initLiff() {
      const status = document.getElementById('statusMsg');
      try {
        status.textContent = 'กำลังเชื่อมต่อ LINE...';
        status.className = 'status loading';

        await liff.init({ liffId: LIFF_ID });

        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        lineProfile = await liff.getProfile();

        // Show LINE profile
        document.getElementById('profilePic').src = lineProfile.pictureUrl || '';
        document.getElementById('displayName').textContent = lineProfile.displayName;
        document.getElementById('profileSection').classList.remove('hidden');

        status.textContent = '';

        // Init MSAL (check if loaded)
        if (typeof msal !== 'undefined') {
          msalInstance = new msal.PublicClientApplication(msalConfig);
          await msalInstance.initialize();
          document.getElementById('msLoginBtn').disabled = false;

          // Check if returning from redirect
          const response = await msalInstance.handleRedirectPromise();
          if (response && response.account) {
            await handleMsLogin(response.account);
          }
        } else {
          status.textContent = 'กำลังโหลด Microsoft SDK...';
          status.className = 'status loading';
          // Retry after a moment
          setTimeout(async () => {
            if (typeof msal !== 'undefined') {
              msalInstance = new msal.PublicClientApplication(msalConfig);
              await msalInstance.initialize();
              document.getElementById('msLoginBtn').disabled = false;
              status.textContent = '';
            } else {
              status.textContent = 'ไม่สามารถโหลด Microsoft SDK ได้ กรุณาปิดแล้วเปิดใหม่';
              status.className = 'status error';
            }
          }, 3000);
        }
      } catch (err) {
        status.textContent = 'ไม่สามารถเชื่อมต่อ LINE ได้: ' + err.message;
        status.className = 'status error';
      }
    }

    // === Microsoft Login ===
    document.getElementById('msLoginBtn').addEventListener('click', async () => {
      const status = document.getElementById('statusMsg');

      if (!msalInstance) {
        status.textContent = 'Microsoft SDK ยังไม่พร้อม กรุณารอสักครู่';
        status.className = 'status error';
        return;
      }

      status.textContent = 'กำลังเปิดหน้า Microsoft Login...';
      status.className = 'status loading';
      document.getElementById('msLoginBtn').disabled = true;

      try {
        // Try popup first (more reliable in in-app browsers)
        const response = await msalInstance.loginPopup({
          scopes: ['User.Read'],
          prompt: 'select_account'
        });
        if (response.account) {
          await handleMsLogin(response.account);
        }
      } catch (popupErr) {
        // Fallback to redirect
        try {
          await msalInstance.loginRedirect({
            scopes: ['User.Read'],
            prompt: 'select_account'
          });
        } catch (redirectErr) {
          status.textContent = 'ไม่สามารถเข้าสู่ระบบ Microsoft ได้: ' + popupErr.message;
          status.className = 'status error';
          document.getElementById('msLoginBtn').disabled = false;
        }
      }
    });

    // === Handle MS Login Success ===
    async function handleMsLogin(account) {
      const status = document.getElementById('statusMsg');
      const msEmail = account.username;
      const msName = account.name || msEmail;

      // Show MS account info
      document.getElementById('msName').textContent = msName;
      document.getElementById('msEmail').textContent = msEmail;
      document.getElementById('msAccountSection').classList.remove('hidden');
      document.getElementById('msLoginBtn').classList.add('hidden');

      status.textContent = 'กำลังลงทะเบียน...';
      status.className = 'status loading';

      try {
        const res = await fetch(WEBHOOK_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            userId: lineProfile.userId,
            displayName: lineProfile.displayName,
            pictureUrl: lineProfile.pictureUrl || '',
            msEmail: msEmail,
            msName: msName
          })
        });

        const data = await res.json();

        if (data.success) {
          document.getElementById('formCard').classList.add('hidden');
          document.getElementById('successCard').classList.remove('hidden');
          setTimeout(() => {
            if (liff.isInClient()) {
              liff.closeWindow();
            }
          }, 2000);
        } else {
          status.textContent = data.message || 'เกิดข้อผิดพลาด กรุณาลองใหม่';
          status.className = 'status error';
          document.getElementById('msLoginBtn').classList.remove('hidden');
        }
      } catch (err) {
        status.textContent = 'เกิดข้อผิดพลาด: ' + err.message;
        status.className = 'status error';
        document.getElementById('msLoginBtn').classList.remove('hidden');
      }
    }

    // === Start ===
    if (typeof liff !== 'undefined') {
      initLiff();
    } else {
      document.getElementById('statusMsg').textContent = 'กำลังโหลด...';
      document.getElementById('statusMsg').className = 'status loading';
      window.addEventListener('load', function() {
        if (typeof liff !== 'undefined') {
          initLiff();
        } else {
          document.getElementById('statusMsg').textContent = 'ไม่สามารถโหลด LINE SDK ได้';
          document.getElementById('statusMsg').className = 'status error';
        }
      });
    }
  </script>
</body>
</html>
